name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BACKEND_URL: http://10.0.0.9:5001
  FRONTEND_PORT: "5273"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy:
    name: Deploy (self-hosted)
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          npm cache clean --force 2>/dev/null || true
          rm -rf node_modules dist 2>/dev/null || true
          df -h .

      - name: Build (VITE_API_URL baked at build time)
        env:
          VITE_API_URL: ${{ env.BACKEND_URL }}
        run: |
          npm ci
          npm run build

      - name: Install production deps
        run: npm ci --omit=dev

      - name: PM2 reload
        run: |
          export PATH="$PATH:$(npm config get prefix)/bin"
          npx pm2 startOrReload ecosystem.config.cjs --update-env
          npx pm2 save

      - name: Status
        run: npx pm2 list | grep spatial-web
